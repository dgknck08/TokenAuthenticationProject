spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_batch_fetch_size=${SPRING_JPA_DEFAULT_BATCH_FETCH_SIZE:50}
spring.jpa.properties.hibernate.jdbc.batch_size=${SPRING_JPA_JDBC_BATCH_SIZE:50}
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:0}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}

app.mail.from=${APP_MAIL_FROM:no-reply@ecommerce.local}
app.email.verification-base-url=${APP_EMAIL_VERIFICATION_BASE_URL:http://localhost:3000/verify-email}
app.email.verification-expiration-ms=${APP_EMAIL_VERIFICATION_EXPIRATION_MS:1800000}
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL:http://localhost:3000/auth/reset-password}
app.password-reset.expiration-ms=${APP_PASSWORD_RESET_EXPIRATION_MS:900000}
app.idempotency.ttl-hours=${APP_IDEMPOTENCY_TTL_HOURS:24}
app.payment.iyzico.enabled=${APP_PAYMENT_IYZICO_ENABLED:false}
app.payment.iyzico.api-base-url=${APP_PAYMENT_IYZICO_API_BASE_URL:https://sandbox-api.iyzipay.com}
app.payment.iyzico.api-key=${APP_PAYMENT_IYZICO_API_KEY:}
app.payment.iyzico.secret-key=${APP_PAYMENT_IYZICO_SECRET_KEY:}
app.payment.iyzico.callback-url=${APP_PAYMENT_IYZICO_CALLBACK_URL:http://localhost:8080/api/payments/iyzico/callback}
app.payment.iyzico.frontend-base-url=${APP_PAYMENT_IYZICO_FRONTEND_BASE_URL:http://localhost:3000}
app.payment.iyzico.default-identity-number=${APP_PAYMENT_IYZICO_DEFAULT_IDENTITY_NUMBER:}
app.payment.iyzico.default-buyer-ip=${APP_PAYMENT_IYZICO_DEFAULT_BUYER_IP:}
app.payment.iyzico.webhook-secret=${APP_PAYMENT_IYZICO_WEBHOOK_SECRET:}
app.payment.iyzico.verify-webhook-signature=${APP_PAYMENT_IYZICO_VERIFY_WEBHOOK_SIGNATURE:true}
app.checkout.tax-rate=${APP_CHECKOUT_TAX_RATE:0.20}
app.checkout.standard-shipping-fee=${APP_CHECKOUT_STANDARD_SHIPPING_FEE:49.90}
app.checkout.express-shipping-fee=${APP_CHECKOUT_EXPRESS_SHIPPING_FEE:89.90}
app.checkout.free-shipping-threshold=${APP_CHECKOUT_FREE_SHIPPING_THRESHOLD:2000.00}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://frontend}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.iyzipay.com,https://*.iyzico.com}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoint.env.access=none
management.endpoint.configprops.access=none

server.forward-headers-strategy=framework
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

logging.level.root=INFO
logging.level.org.springframework.security=INFO
