services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    command: sh -c "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Dspring.profiles.active=docker"

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce_db
      SPRING_DATASOURCE_USERNAME: ecommerce_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:?JWT_EXPIRATION_MS is required}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:?JWT_REFRESH_EXPIRATION_MS is required}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://frontend}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SMTP_CONNECTION_TIMEOUT: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      SPRING_MAIL_SMTP_TIMEOUT: ${SPRING_MAIL_SMTP_TIMEOUT:-5000}
      SPRING_MAIL_SMTP_WRITE_TIMEOUT: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:-5000}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@ecommerce.local}
      APP_EMAIL_VERIFICATION_BASE_URL: ${APP_EMAIL_VERIFICATION_BASE_URL:-http://localhost:3000/verify-email}
      APP_EMAIL_VERIFICATION_EXPIRATION_MS: ${APP_EMAIL_VERIFICATION_EXPIRATION_MS:-1800000}
      APP_PASSWORD_RESET_BASE_URL: ${APP_PASSWORD_RESET_BASE_URL:-http://localhost:3000/auth/reset-password}
      APP_PASSWORD_RESET_EXPIRATION_MS: ${APP_PASSWORD_RESET_EXPIRATION_MS:-900000}
      APP_IDEMPOTENCY_TTL_HOURS: ${APP_IDEMPOTENCY_TTL_HOURS:-24}
      APP_PAYMENT_IYZICO_ENABLED: ${APP_PAYMENT_IYZICO_ENABLED:-false}
      APP_PAYMENT_IYZICO_API_BASE_URL: ${APP_PAYMENT_IYZICO_API_BASE_URL:-https://sandbox-api.iyzipay.com}
      APP_PAYMENT_IYZICO_API_KEY: ${APP_PAYMENT_IYZICO_API_KEY:-}
      APP_PAYMENT_IYZICO_SECRET_KEY: ${APP_PAYMENT_IYZICO_SECRET_KEY:-}
      APP_PAYMENT_IYZICO_CALLBACK_URL: ${APP_PAYMENT_IYZICO_CALLBACK_URL:-http://localhost:8080/api/payments/iyzico/callback}
      APP_PAYMENT_IYZICO_FRONTEND_BASE_URL: ${APP_PAYMENT_IYZICO_FRONTEND_BASE_URL:-http://localhost:3000}
      APP_PAYMENT_IYZICO_DEFAULT_IDENTITY_NUMBER: ${APP_PAYMENT_IYZICO_DEFAULT_IDENTITY_NUMBER:-}
      APP_PAYMENT_IYZICO_DEFAULT_BUYER_IP: ${APP_PAYMENT_IYZICO_DEFAULT_BUYER_IP:-}
      APP_PAYMENT_IYZICO_WEBHOOK_SECRET: ${APP_PAYMENT_IYZICO_WEBHOOK_SECRET:-}
      APP_PAYMENT_IYZICO_VERIFY_WEBHOOK_SIGNATURE: ${APP_PAYMENT_IYZICO_VERIFY_WEBHOOK_SIGNATURE:-false}
      APP_CHECKOUT_TAX_RATE: ${APP_CHECKOUT_TAX_RATE:-0.20}
      APP_CHECKOUT_STANDARD_SHIPPING_FEE: ${APP_CHECKOUT_STANDARD_SHIPPING_FEE:-49.90}
      APP_CHECKOUT_EXPRESS_SHIPPING_FEE: ${APP_CHECKOUT_EXPRESS_SHIPPING_FEE:-89.90}
      APP_CHECKOUT_FREE_SHIPPING_THRESHOLD: ${APP_CHECKOUT_FREE_SHIPPING_THRESHOLD:-2000.00}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-ecommerce/products}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 30s

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  backend-network:
    driver: bridge

